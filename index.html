<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kernel stuff</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* --- M3 Color Tokens (Mặc định Light Mode) --- */
        :root {
            --md-primary: #0A58CA;
            --md-on-primary: #FFFFFF;
            --md-primary-container: #D7E2FF;
            --md-on-primary-container: #001B44;
            --md-surface: #F8F9FA;
            --md-surface-variant: #E1E2EC;
            --md-on-surface: #1A1C1E;
            --md-on-surface-variant: #43474E;
            --md-background: #FFFFFF;
            --md-outline: #73777F;
            --md-corner-card: 12px;
            --md-corner-btn: 100px; /* Pill shape đặc trưng M3 */
        }

        /* --- M3 Color Tokens (Dark Mode) --- */
        [data-theme="dark"] {
            --md-primary: #AAC7FF;
            --md-on-primary: #002E6A;
            --md-primary-container: #004397;
            --md-on-primary-container: #D7E2FF;
            --md-surface: #202529;
            --md-surface-variant: #43474E;
            --md-on-surface: #E2E2E6;
            --md-on-surface-variant: #C3C6CF;
            --md-background: #111418;
            --md-outline: #8D9199;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-background);
            color: var(--md-on-surface);
            padding-bottom: 40px;
        }

        /* --- Navbar / Header --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background-color: var(--md-background);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 400;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- Các nút chức năng tròn nhỏ --- */
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background-color: var(--md-surface-variant);
        }

        /* --- Bộ chọn ngôn ngữ ẩn gọn gàng --- */
        .lang-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--md-surface);
            padding: 4px 12px;
            border-radius: var(--md-corner-btn);
            border: 1px solid var(--md-outline);
        }
        .lang-wrapper select {
            background: transparent;
            border: none;
            color: var(--md-on-surface);
            font-size: 14px;
            outline: none;
            cursor: pointer;
            padding-left: 4px;
        }

        /* --- Layout chính --- */
        .container {
            max-width: 800px;
            margin: 16px auto;
            padding: 0 16px;
        }

        /* --- Tiêu đề trang đơn giản --- */
        .hero {
            margin-bottom: 24px;
            padding: 12px 4px;
        }
        .hero h2 {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 8px;
            color: var(--md-on-surface);
        }
        .hero p {
            color: var(--md-on-surface-variant);
            font-size: 14px;
        }

        /* --- Thẻ Card kiểu M3 --- */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--md-surface);
            border-radius: var(--md-corner-card);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-size: 20px;
            font-weight: 500;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--md-on-surface-variant);
            margin-top: 2px;
        }

        /* Badge trạng thái thu gọn */
        .badge {
            font-size: 11px;
            font-weight: 700;
            background-color: var(--md-primary-container);
            color: var(--md-on-primary-container);
            padding: 4px 10px;
            border-radius: var(--md-corner-btn);
            text-transform: uppercase;
        }

        /* --- Khung Changelog (Markdown) --- */
        .changelog-box {
            font-size: 14px;
            color: var(--md-on-surface);
            line-height: 1.6;
        }
        .changelog-box p { margin-bottom: 6px; }
        .changelog-box ul { padding-left: 20px; margin-bottom: 8px; }
        .changelog-box li { margin-bottom: 2px; }
        .changelog-box strong { color: var(--md-primary); }
        .changelog-box a { color: var(--md-primary); text-decoration: none; font-weight: 500; }
        .changelog-box a:hover { text-decoration: underline; }

        /* --- Khu vực các nút bấm --- */
        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* Nút M3 Pill-Shape */
        .btn {
            font-family: 'Roboto', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            padding: 0 20px;
            height: 40px;
            border-radius: var(--md-corner-btn);
            cursor: pointer;
            text-decoration: none;
            border: none;
        }

        /* Nút Tải về chính */
        .btn-filled {
            background-color: var(--md-primary);
            color: var(--md-on-primary);
        }
        .btn-filled:hover {
            opacity: 0.9;
        }

        /* Nút Xem mã nguồn phụ */
        .btn-outlined {
            background-color: transparent;
            color: var(--md-primary);
            border: 1px solid var(--md-outline);
        }
        .btn-outlined:hover {
            background-color: var(--md-surface-variant);
        }

        /* --- Trạng thái loading --- */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--md-on-surface-variant);
        }

        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 12px;
            color: var(--md-on-surface-variant);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <span class="material-icons-round">developer_mode</span>
            <span id="txt-app-title">kernel stuff</span>
        </div>
        <div class="navbar-actions">
            <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                <span class="material-icons-round" id="theme-icon">dark_mode</span>
            </button>
            <a href="https://github.com/ncatg/kernel" target="_blank" class="icon-btn" title="GitHub">
                <span class="material-icons-round">code</span>
            </a>
            <div class="lang-wrapper">
                <span class="material-icons-round" style="font-size: 16px;">translate</span>
                <select id="lang-select" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="vi">Tiếng Việt</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <h2 id="txt-hero-title">Kernel Download Center</h2>
            <p id="txt-hero-desc">Select and download custom kernels for Samsung Galaxy A32 (a32). Flash via TWRP/OrangeFox at your own risk.</p>
        </section>

        <main id="main-content">
            <div class="loading-state" id="status-area">
                <p id="txt-loading">Loading releases from GitHub...</p>
            </div>
            <div class="card-list" id="kernel-list" style="display: none;"></div>
        </main>

        <footer>
            <p>&copy; 2026 A32 Modding Community • Material 3 Expressive Style</p>
        </footer>
    </div>

    <script>
        const i18n = {
            en: {
                appTitle: "kernel stuff",
                heroTitle: "Kernel Center for A32",
                heroDesc: "Select and download custom kernels for Samsung Galaxy A32 (a32). Flash via TWRP/OrangeFox at your own risk.",
                loading: "Loading releases from GitHub...",
                error: "Failed to load releases. Please check GitHub repository directly.",
                stable: "Stable",
                preRelease: "Pre-release",
                published: "Published",
                viewSource: "Source Code"
            },
            vi: {
                appTitle: "kernel stuff",
                heroTitle: "Trung tâm Kernel A32",
                heroDesc: "Chọn và tải về bản custom kernel phù hợp cho Samsung Galaxy A32 (a32). Cài đặt qua TWRP/OrangeFox và tự chịu mọi rủi ro.",
                loading: "Đang tải các phiên bản từ GitHub...",
                error: "Không thể tải danh sách phiên bản. Vui lòng kiểm tra trực tiếp trên GitHub.",
                stable: "Ổn định",
                preRelease: "Thử nghiệm",
                published: "Phát hành ngày",
                viewSource: "Mã nguồn"
            }
        };

        let currentLang = 'en';
        let fetchedReleases = [];

        // HÀM CHUYỂN ĐỔI GIAO DIỆN SÁNG / TỐI
        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.innerText = 'dark_mode';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.innerText = 'light_mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            document.getElementById('txt-app-title').innerText = i18n[lang].appTitle;
            document.getElementById('txt-hero-title').innerText = i18n[lang].heroTitle;
            document.getElementById('txt-hero-desc').innerText = i18n[lang].heroDesc;
            document.getElementById('txt-loading').innerText = i18n[lang].loading;

            if (fetchedReleases.length > 0) {
                renderReleases(fetchedReleases);
            }
        }

        async function loadGitHubReleases() {
            const statusArea = document.getElementById('status-area');
            const listArea = document.getElementById('kernel-list');
            
            try {
                const response = await fetch('https://api.github.com/repos/ncatg/kernel/releases');
                if (!response.ok) throw new Error('Error network');
                
                fetchedReleases = await response.json();
                
                if(fetchedReleases.length === 0) {
                     statusArea.innerHTML = `<p>No releases found.</p>`;
                     return;
                }

                statusArea.style.display = 'none';
                listArea.style.display = 'flex';
                renderReleases(fetchedReleases);

            } catch (error) {
                console.error(error);
                statusArea.innerHTML = `<p style="color:var(--md-error);">${i18n[currentLang].error}</p>`;
            }
        }

        // HÀM LỌC TÊN FILE THÔNG MINH (ÁP DỤNG ĐỒNG NHẤT CẢ 2 NGÔN NGỮ)
        
        function renderReleases(releases) {
            const listArea = document.getElementById('kernel-list');
            listArea.innerHTML = ''; 

            releases.forEach(release => {
                const card = document.createElement('article');
                card.className = 'card';

                const isPreRelease = release.prerelease;
                const badgeText = isPreRelease ? i18n[currentLang].preRelease : i18n[currentLang].stable;

                const publishDate = new Date(release.published_at).toLocaleDateString(currentLang === 'vi' ? 'vi-VN' : 'en-US', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });

                // Tiền xử lý văn bản thô từ tác giả để chuyển dịch sang định dạng danh sách Markdown chuẩn
                let rawMarkdown = release.body ? release.body : "*No description provided.*";
                rawMarkdown = rawMarkdown
                    .replace(/ # Author:/g, '\n\n**Author:**')
                    .replace(/ # Features \| Changelogs:/g, '\n\n**Features & Changelogs:**')
                    .replace(/ # Kernel source:/g, '\n\n**Kernel source:** ')
                    .replace(/ - /g, '\n* ');

                const parsedChangelog = marked.parse(rawMarkdown);

                let assetButtons = '';
                if(release.assets && release.assets.length > 0) {
                    release.assets.forEach(asset => {
                        const customBtnText = getButtonText(asset.name);
                        assetButtons += `
                            <a href="${asset.browser_download_url}" class="btn btn-filled">
                                <span class="material-icons-round" style="font-size:18px;">download</span>${customBtnText}
                            </a>
                        `;
                    });
                } else {
                    assetButtons = `
                        <a href="${release.html_url}" target="_blank" class="btn btn-filled">
                            <span class="material-icons-round" style="font-size:18px;">launch</span>DOWNLOAD SOURCE
                        </a>
                    `;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <h3 class="card-title">${release.name || release.tag_name}</h3>
                            <p class="card-subtitle">${i18n[currentLang].published}: ${publishDate}</p>
                        </div>
                        <span class="badge">${badgeText}</span>
                    </div>
                    <div class="changelog-box">
                        ${parsedChangelog}
                    </div>
                    <div class="card-actions">
                        <a href="${release.html_url}" target="_blank" class="btn btn-outlined">
                            <span class="material-icons-round" style="font-size:18px;">visibility</span>${i18n[currentLang].viewSource}
                        </a>
                        ${assetButtons}
                    </div>
                `;
                listArea.appendChild(card);
            });
        }

        // Tự động kiểm tra cấu hình theme cũ của thiết bị
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('theme-icon').innerText = 'light_mode';
            }
            changeLanguage('en'); 
            loadGitHubReleases(); 
        });
    </script>
</body>
</html>

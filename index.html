<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kernel stuff</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Marked.js để xử lý Markdown cho Changelogs -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* --- Material Design 2 Color Palette & Reset --- */
        :root {
            --md-primary: #6200EE;
            --md-primary-variant: #3700B3;
            --md-secondary: #03DAC6;
            --md-background: #F5F5F5;
            --md-surface: #FFFFFF;
            --md-error: #B00020;
            --md-on-primary: #FFFFFF;
            --md-on-surface: #000000;
            --md-on-surface-medium: rgba(0, 0, 0, 0.6);
            --md-elevation-2: 0px 2px 4px -1px rgba(0,0,0,0.2), 0px 4px 5px 0px rgba(0,0,0,0.14), 0px 1px 10px 0px rgba(0,0,0,0.12);
            --md-elevation-4: 0px 4px 5px 0px rgba(0,0,0,0.14), 0px 1px 10px 0px rgba(0,0,0,0.12), 0px 2px 4px -1px rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-background);
            color: var(--md-on-surface);
            line-height: 1.5;
        }

        /* --- Top App Bar --- */
        .app-bar {
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: var(--md-elevation-4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-bar-left {
            display: flex;
            align-items: center;
        }

        .app-bar .menu-icon {
            margin-right: 16px;
        }

        .app-bar h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.25px;
        }

        .app-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .github-link {
            color: var(--md-on-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .github-link:hover { opacity: 1; }

        /* --- Language Selector --- */
        .lang-selector-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
        }

        .lang-selector-wrapper .material-icons {
            font-size: 18px;
            margin-right: 4px;
            color: var(--md-on-primary);
        }

        .lang-select {
            background: transparent;
            border: none;
            color: var(--md-on-primary);
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .lang-select option {
            background-color: var(--md-surface);
            color: var(--md-on-surface);
        }

        /* --- Main Layout --- */
        .container {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* --- Hero / Banner Section --- */
        .hero-card {
            background-color: var(--md-surface);
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--md-elevation-2);
        }

        .hero-card h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .hero-card p {
            color: var(--md-on-surface-medium);
            font-size: 14px;
        }

        /* --- Status States --- */
        .status-message {
            text-align: center;
            padding: 48px;
            color: var(--md-on-surface-medium);
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--md-primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 16px;
        }
        @media(min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
        }

        .card {
            background-color: var(--md-surface);
            border-radius: 4px;
            box-shadow: var(--md-elevation-2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0px 5px 5px -3px rgba(0,0,0,0.2), 0px 8px 10px 1px rgba(0,0,0,0.14), 0px 3px 14px 2px rgba(0,0,0,0.12);
        }

        .card-header {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }

        .badge {
            background-color: var(--md-secondary);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            float: right;
            text-transform: uppercase;
        }
        .badge.pre { background-color: #FFE082; }

        .card-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 14px;
            color: var(--md-on-surface-medium);
        }

        /* --- Changelog Markdown Container --- */
        .card-body {
            padding: 16px;
            flex-grow: 1;
            font-size: 14px;
            color: rgba(0,0,0,0.87);
            background-color: #FAFAFA;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            max-height: 300px;
            overflow-y: auto;
        }

        /* Style các thành phần Markdown bên trong Changelog */
        .changelog-content h1, .changelog-content h2, .changelog-content h3 {
            font-size: 16px;
            font-weight: 500;
            margin: 12px 0 6px 0;
            color: var(--md-primary);
        }
        .changelog-content p {
            margin-bottom: 8px;
        }
        .changelog-content ul, .changelog-content ol {
            padding-left: 20px;
            margin-bottom: 12px;
        }
        .changelog-content li {
            margin-bottom: 4px;
        }
        .changelog-content code {
            font-family: monospace;
            background-color: rgba(0,0,0,0.06);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 13px;
        }
        .changelog-content pre {
            background-color: rgba(0,0,0,0.06);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 12px;
        }

        .card-actions {
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            background-color: var(--md-surface);
        }

        /* --- Material Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.75px;
            text-transform: uppercase;
            padding: 0 16px;
            height: 36px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .btn-contained {
            background-color: var(--md-primary);
            color: var(--md-on-primary);
            box-shadow: 0px 3px 1px -2px rgba(0,0,0,0.2), 0px 2px 2px 0px rgba(0,0,0,0.14), 0px 1px 5px 0px rgba(0,0,0,0.12);
        }
        .btn-contained:hover { background-color: var(--md-primary-variant); }

        .btn-outlined {
            background-color: transparent;
            color: var(--md-primary);
            border: 1px solid rgba(98, 0, 238, 0.5);
        }
        .btn-outlined:hover { background-color: rgba(98, 0, 238, 0.04); }

        .btn .material-icons {
            margin-right: 6px;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 32px 16px;
            color: var(--md-on-surface-medium);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Top App Bar -->
    <header class="app-bar">
        <div class="app-bar-left">
            <span class="material-icons menu-icon">developer_mode</span>
            <h1 id="txt-app-title">kernel stuff</h1>
        </div>
        <div class="app-bar-right">
            <a href="https://github.com/ncatg/kernel" target="_blank" class="github-link" title="GitHub Repository">
                <span class="material-icons">code</span>
            </a>
            <div class="lang-selector-wrapper">
                <span class="material-icons">translate</span>
                <select id="lang-select" class="lang-select" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="vi">Tiếng Việt</option>
                </select>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero-card">
            <h2 id="txt-hero-title">Kernel Download Center for Galaxy A32</h2>
            <p id="txt-hero-desc">Select and download custom kernels for Samsung Galaxy A32 (a32). Flash via TWRP/OrangeFox at your own risk.</p>
        </section>

        <!-- Dynamic Content Area -->
        <main id="main-content">
            <div class="status-message" id="status-area">
                <div class="spinner"></div>
                <span id="txt-loading">Loading releases from GitHub...</span>
            </div>
            <div class="grid" id="kernel-grid" style="display: none;"></div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 A32 Modding Community. Powered by GitHub API.</p>
    </footer>

    <script>
        // Từ điển đa ngôn ngữ (Mặc định: Tiếng Anh 'en')
        const i18n = {
            en: {
                appTitle: "kernel stuff",
                heroTitle: "Kernel Download Center for Galaxy A32",
                heroDesc: "Select and download custom kernels for Samsung Galaxy A32 (a32). Flash via TWRP/OrangeFox at your own risk.",
                loading: "Loading releases from GitHub...",
                error: "Failed to load releases. Please check the repository directly.",
                stable: "Stable",
                preRelease: "Pre-release",
                published: "Published",
                viewSource: "Source Code"
            },
            vi: {
                appTitle: "kernel stuff",
                heroTitle: "Trung tâm tải Kernel cho Galaxy A32",
                heroDesc: "Chọn và tải về bản custom kernel phù hợp cho Samsung Galaxy A32 (a32). Cài đặt qua TWRP/OrangeFox và tự chịu mọi rủi ro.",
                loading: "Đang tải các phiên bản từ GitHub...",
                error: "Không thể tải danh sách phiên bản. Vui lòng kiểm tra trực tiếp trên GitHub.",
                stable: "Ổn định",
                preRelease: "Thử nghiệm",
                published: "Phát hành ngày",
                viewSource: "Mã nguồn"
            }
        };

        let currentLang = 'en';
        let fetchedReleases = [];

        // Thay đổi ngôn ngữ công cụ
        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            document.getElementById('txt-app-title').innerText = i18n[lang].appTitle;
            document.getElementById('txt-hero-title').innerText = i18n[lang].heroTitle;
            document.getElementById('txt-hero-desc').innerText = i18n[lang].heroDesc;
            document.getElementById('txt-loading').innerText = i18n[lang].loading;

            if (fetchedReleases.length > 0) {
                renderReleases(fetchedReleases);
            }
        }

        // Tải dữ liệu từ GitHub Releases API
        async function loadGitHubReleases() {
            const statusArea = document.getElementById('status-area');
            const gridArea = document.getElementById('kernel-grid');
            
            try {
                const response = await fetch('https://api.github.com/repos/ncatg/kernel/releases');
                if (!response.ok) throw new Error('Network response error');
                
                fetchedReleases = await response.json();
                
                if(fetchedReleases.length === 0) {
                     statusArea.innerHTML = `<span class="material-icons" style="font-size:48px;">info</span><span>No releases found.</span>`;
                     return;
                }

                statusArea.style.display = 'none';
                gridArea.style.display = 'grid';
                renderReleases(fetchedReleases);

            } catch (error) {
                console.error(error);
                statusArea.innerHTML = `
                    <span class="material-icons" style="color:var(--md-error); font-size:48px;">error_outline</span>
                    <span style="color:var(--md-error);">${i18n[currentLang].error}</span>
                    <br><br>
                    <a href="https://github.com/ncatg/kernel/releases" target="_blank" class="btn btn-contained">Go to GitHub</a>
                `;
            }
        }

        // Hàm xử lý logic đặt tên nút tải dựa trên tên file (Áp dụng cho cả 2 ngôn ngữ)
        function getButtonText(fileName) {
            if (fileName.includes("EXPERIENCE@NONGKI_SUSFS")) {
                return "SusFS build";
            }
            if (fileName.includes("EXPERIENCE@NONGKI.zip")) {
                return "Non-SusFS build";
            }
            if (fileName.includes("enf")) {
                return "Enforcing build";
            }
            if (fileName.includes("per")) {
                return "Permissive build";
            }
            return "DOWNLOAD";
        }

        // Render cấu trúc thẻ Card
        function renderReleases(releases) {
            const gridArea = document.getElementById('kernel-grid');
            gridArea.innerHTML = ''; 

            releases.forEach(release => {
                const card = document.createElement('article');
                card.className = 'card';

                const isPreRelease = release.prerelease;
                const badgeText = isPreRelease ? i18n[currentLang].preRelease : i18n[currentLang].stable;
                const badgeClass = isPreRelease ? 'badge pre' : 'badge';

                const publishDate = new Date(release.published_at).toLocaleDateString(currentLang === 'vi' ? 'vi-VN' : 'en-US', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });

                // Sử dụng thư viện marked.parse để chuyển đổi văn bản Markdown sang HTML một cách chuẩn chỉnh
                const rawMarkdown = release.body ? release.body : "*No description provided.*";
                const parsedChangelog = marked.parse(rawMarkdown);

                // Tạo danh sách nút tải file dựa trên logic lọc tên file đầu vào
                let assetButtons = '';
                if(release.assets && release.assets.length > 0) {
                    release.assets.forEach(asset => {
                        const customBtnText = getButtonText(asset.name);
                        assetButtons += `
                            <a href="${asset.browser_download_url}" class="btn btn-contained" title="${asset.name}">
                                <span class="material-icons">download</span>${customBtnText}
                            </a>
                        `;
                    });
                } else {
                    // Nếu release trống, tạo nút tải source mặc định
                    assetButtons = `
                        <a href="${release.html_url}" target="_blank" class="btn btn-contained">
                            <span class="material-icons">launch</span>DOWNLOAD SOURCE
                        </a>
                    `;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="${badgeClass}">${badgeText}</span>
                        <h3 class="card-title">${release.name || release.tag_name}</h3>
                        <p class="card-subtitle">${i18n[currentLang].published}: ${publishDate}</p>
                    </div>
                    <div class="card-body">
                        <div class="changelog-content">
                            ${parsedChangelog}
                        </div>
                    </div>
                    <div class="card-actions">
                        <a href="${release.html_url}" target="_blank" class="btn btn-outlined">
                            <span class="material-icons">visibility</span>${i18n[currentLang].viewSource}
                        </a>
                        ${assetButtons}
                    </div>
                `;
                gridArea.appendChild(card);
            });
        }

        // Khởi chạy hệ thống khi tải xong trang web
        window.addEventListener('DOMContentLoaded', () => {
            changeLanguage('en'); 
            loadGitHubReleases(); 
        });
    </script>
</body>
</html>

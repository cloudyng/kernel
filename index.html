<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kernel releases</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --purple: #d2a8ff;
      --btn-bg: #21262d;
      --btn-border: #363b42;
      --btn-hover: #30363d;
      --code-bg: #1c2128;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }

    .page-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      padding-bottom: 16px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .page-title { font-size: 22px; font-weight: 600; color: var(--text); }
    .page-title a { color: inherit; }
    .page-title em { font-style: normal; color: var(--accent); }
    .page-count { font-size: 13px; color: var(--muted); }

    /* ── Release card ── */
    .release {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .release.is-latest { border-color: rgba(63, 185, 80, 0.5); }

    .release-head {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .release-tag {
      font-family: var(--mono); font-size: 14px; font-weight: 600;
      color: var(--text); word-break: break-all;
    }
    .release-tag a { color: inherit; }
    .badge {
      font-size: 12px; font-weight: 500;
      padding: 1px 8px; border-radius: 9999px;
      border: 1px solid transparent; white-space: nowrap;
    }
    .badge-latest { color: var(--green); border-color: rgba(63, 185, 80, 0.4); }
    .badge-pre    { color: var(--purple); border-color: rgba(210, 168, 255, 0.4); }

    .release-name {
      font-size: 18px; font-weight: 600;
      margin-bottom: 12px; word-break: break-word;
    }

    /* ── Downloads box ── */
    .downloads {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .downloads-title {
      font-size: 12px; font-weight: 600; color: var(--muted);
      padding: 8px 12px;
      background: var(--btn-bg);
      border-bottom: 1px solid var(--border);
    }
    .asset {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }
    .asset:last-child { border-bottom: none; }
    .asset:hover { background: var(--btn-hover); text-decoration: none; }
    .asset:hover .asset-name { text-decoration: underline; }
    .asset svg { flex-shrink: 0; color: var(--muted); }
    .asset-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .asset-size { font-family: var(--mono); font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .asset.src { color: var(--muted); }
    .asset.src:hover { color: var(--text); }

    /* ── Changelog (markdown) ── */
    .changelog {
      font-size: 14px;
      color: var(--text);
      overflow-wrap: break-word;
    }
    .changelog > *:first-child { margin-top: 0; }
    .changelog > *:last-child { margin-bottom: 0; }
    .changelog h1, .changelog h2, .changelog h3, .changelog h4 {
      font-weight: 600; line-height: 1.25;
      margin: 20px 0 10px;
    }
    .changelog h1 { font-size: 18px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .changelog h2 { font-size: 16px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .changelog h3 { font-size: 15px; }
    .changelog h4 { font-size: 14px; }
    .changelog p { margin: 0 0 10px; }
    .changelog ul, .changelog ol { margin: 0 0 10px; padding-left: 24px; }
    .changelog li { margin: 3px 0; }
    .changelog li > ul, .changelog li > ol { margin-bottom: 0; }
    .changelog code {
      font-family: var(--mono); font-size: 12.5px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }
    .changelog pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin: 0 0 10px;
      overflow-x: auto;
    }
    .changelog pre code {
      background: none; border: none; padding: 0;
      font-size: 12.5px; line-height: 1.5;
    }
    .changelog blockquote {
      margin: 0 0 10px; padding: 0 12px;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    .changelog hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .changelog img { max-width: 100%; border-radius: 6px; }
    .no-notes { color: var(--muted); font-style: italic; }

    /* ── Loading / Error ── */
    .state-box { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 24px; height: 24px; margin: 0 auto 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 2s; } }
    .state-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .state-sub { color: var(--muted); }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="page-head">
      <h1 class="page-title">
        <a href="https://github.com/cloudyng/kernel/releases" target="_blank" rel="noopener">cloudyng/<em>kernel</em></a>
      </h1>
      <span class="page-count" id="page-count">Loading…</span>
    </div>

    <div id="list">
      <div class="state-box">
        <div class="spinner"></div>
        <p class="state-sub">Fetching releases from GitHub…</p>
      </div>
    </div>
  </div>

<script>
  // ─── Helpers ──────────────────────────────────────
  function fmt(bytes) {
    if (!bytes) return '';
    if (bytes < 1024)    return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── Mini markdown renderer ───────────────────────
  // Escape trước, render sau → an toàn với HTML trong release notes
  function renderMarkdown(md) {
    if (!md || !md.trim()) return '<p class="no-notes">No release notes provided.</p>';

    // 1. Tách code block ra trước để không bị parse nhầm
    const codeBlocks = [];
    md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      codeBlocks.push('<pre><code>' + esc(code.replace(/\n$/, '')) + '</code></pre>');
      return '\u0000CODE' + (codeBlocks.length - 1) + '\u0000';
    });

    md = esc(md);

    // 2. Inline
    function inline(s) {
      return s
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_]+)__/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/~~([^~]+)~~/g, '<del>$1</del>')
        .replace(/!\[([^\]]*)\]\((https?:[^)\s]+)\)/g, '<img src="$2" alt="$1" loading="lazy">')
        .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // autolink URL trần
        .replace(/(^|[\s(])((https?:\/\/)[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
    }

    // 3. Block-level: đi từng dòng
    const lines = md.split('\n');
    const out = [];
    let listStack = []; // 'ul' | 'ol'
    let para = [];

    function flushPara() {
      if (para.length) {
        out.push('<p>' + inline(para.join(' ')) + '</p>');
        para = [];
      }
    }
    function closeLists(to = 0) {
      while (listStack.length > to) out.push('</' + listStack.pop() + '>');
    }

    for (let raw of lines) {
      const line = raw.replace(/\s+$/, '');
      const trimmed = line.trim();

      // code block placeholder
      const cb = trimmed.match(/^\u0000CODE(\d+)\u0000$/);
      if (cb) { flushPara(); closeLists(); out.push(codeBlocks[+cb[1]]); continue; }

      // dòng trống
      if (!trimmed) { flushPara(); closeLists(); continue; }

      // heading
      const h = trimmed.match(/^(#{1,4})\s+(.*)$/);
      if (h) { flushPara(); closeLists(); out.push('<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>'); continue; }

      // hr
      if (/^([-*_])\1{2,}$/.test(trimmed)) { flushPara(); closeLists(); out.push('<hr>'); continue; }

      // blockquote
      const bq = trimmed.match(/^&gt;\s?(.*)$/);
      if (bq) { flushPara(); closeLists(); out.push('<blockquote><p>' + inline(bq[1]) + '</p></blockquote>'); continue; }

      // list item (hỗ trợ 1 cấp lồng)
      const li = line.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
      if (li) {
        flushPara();
        const depth = li[1].length >= 2 ? 2 : 1;
        const type = /^\d+\.$/.test(li[2]) ? 'ol' : 'ul';
        while (listStack.length > depth) out.push('</' + listStack.pop() + '>');
        while (listStack.length < depth) { out.push('<' + type + '>'); listStack.push(type); }
        out.push('<li>' + inline(li[3]) + '</li>');
        continue;
      }

      // text thường
      closeLists();
      para.push(trimmed);
    }
    flushPara();
    closeLists();
    return out.join('\n');
  }

  function fileIcon() {
    return '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>';
  }

  // ─── Render card ──────────────────────────────────
  function renderCard(rel, isLatest) {
    const tag = esc(rel.tag_name);
    const name = rel.name && rel.name !== rel.tag_name ? esc(rel.name) : null;
    const assets = rel.assets || [];

    const assetRows = assets.map(a =>
      '<a href="' + esc(a.browser_download_url) + '" class="asset" download title="' + esc(a.name) + '">' +
        fileIcon() +
        '<span class="asset-name">' + esc(a.name) + '</span>' +
        (a.size ? '<span class="asset-size">' + fmt(a.size) + '</span>' : '') +
      '</a>'
    ).join('');

    return '' +
'<article class="release' + (isLatest ? ' is-latest' : '') + '">' +
  '<div class="release-head">' +
    '<span class="release-tag"><a href="' + esc(rel.html_url) + '" target="_blank" rel="noopener">' + tag + '</a></span>' +
    (isLatest ? '<span class="badge badge-latest">Latest</span>' : '') +
    (rel.prerelease ? '<span class="badge badge-pre">Pre-release</span>' : '') +
  '</div>' +
  (name ? '<div class="release-name">' + name + '</div>' : '') +
  '<div class="downloads">' +
    '<div class="downloads-title">Downloads</div>' +
    assetRows +
    '<a href="' + esc(rel.zipball_url) + '" class="asset src">' + fileIcon() + '<span class="asset-name">Source code (zip)</span></a>' +
    '<a href="' + esc(rel.tarball_url) + '" class="asset src">' + fileIcon() + '<span class="asset-name">Source code (tar.gz)</span></a>' +
  '</div>' +
  '<div class="changelog">' + renderMarkdown(rel.body) + '</div>' +
'</article>';
  }

  // ─── Fetch & render ───────────────────────────────
  async function load() {
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('page-count');

    try {
      const res = await fetch(
        'https://api.github.com/repos/cloudyng/kernel/releases?per_page=50',
        { headers: { Accept: 'application/vnd.github.v3+json' } }
      );
      if (res.status === 404) throw new Error('Repository not found (404).');
      if (!res.ok) throw new Error('API error: ' + res.status);

      const releases = await res.json();
      if (!releases.length) {
        listEl.innerHTML = '<div class="state-box"><div class="state-title">No releases yet</div></div>';
        countEl.textContent = '0 releases';
        return;
      }

      countEl.textContent = releases.length + ' release' + (releases.length > 1 ? 's' : '');

      let latestFound = false;
      listEl.innerHTML = releases.map(rel => {
        const isLatest = !rel.prerelease && !latestFound;
        if (isLatest) latestFound = true;
        return renderCard(rel, isLatest);
      }).join('');

    } catch (err) {
      listEl.innerHTML =
        '<div class="state-box">' +
          '<div class="state-title">Error loading releases</div>' +
          '<p class="state-sub">' + esc(err.message) + '</p>' +
        '</div>';
      countEl.textContent = 'Failed to load';
    }
  }

  load();
</script>
</body>
</html>
